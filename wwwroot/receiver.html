<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <title>FlameStream</title>
  <!--
    Custom Cast receiver, self-driven playback edition.

    This TV's CAF PlayerManager fails EVERY load (our HLS, Google's own sample HLS,
    plain MP4 — LOAD_FAILED 905 within ~25ms, before any network request), while raw
    <video> + MSE + hls.js on this very page plays the same streams perfectly
    (verified 2026-07-03 via the /api/castlog relay). So this receiver uses the Cast
    SDK only for session management and a custom message channel
    (urn:x-cast:flamestream), and drives playback itself with hls.js — the exact
    stack the desktop web app uses.
  -->
  <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="hls.min.js"></script>
  <script src="receiver.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b0e14;
      overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
    }

    #player {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      background: #0b0e14;
    }

    #player::cue {
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 1.1em;
      color: #fff;
      background: transparent;
      text-shadow:
        -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000,
        0 -2px 0 #000, 0 2px 0 #000, -2px 0 0 #000, 2px 0 0 #000;
    }

    /* Idle splash + title overlay */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #f0f2f5;
      background: #0b0e14;
      transition: opacity .4s;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash .logo { width: 120px; height: 120px; }
    #splash .name { font-size: 26px; font-weight: 600; letter-spacing: .4px; }

    #title-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 28px 40px;
      font-size: 26px;
      font-weight: 600;
      color: #f0f2f5;
      background: linear-gradient(rgba(11,14,20,.85), transparent);
      opacity: 0;
      transition: opacity .4s;
      pointer-events: none;
    }
    #title-bar.visible { opacity: 1; }

    #state-badge {
      position: fixed;
      bottom: 40px; left: 40px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 20px;
      color: #fff;
      background: rgba(11,14,20,.7);
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    #state-badge.visible { opacity: 1; }

    /* Scrub-to-confirm overlay (D-pad seek). Shown while choosing a seek target; the media
       is paused and the thumbnail previews the target frame until OK confirms / Back cancels. */
    #scrub {
      position: fixed;
      left: 50%; bottom: 9vh;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 24px;
      border-radius: 18px;
      background: rgba(11,14,20,.85);
      box-shadow: 0 12px 48px rgba(0,0,0,.6);
      transition: opacity .2s;
      z-index: 50;
    }
    #scrub.hidden { opacity: 0; pointer-events: none; }
    #scrub-thumb {
      width: 384px; height: 216px;
      object-fit: cover;
      border-radius: 12px;
      background: #000;
      border: 2px solid rgba(255,255,255,.16);
      opacity: 0;
      transition: opacity .15s;
    }
    #scrub-bar {
      width: 384px; height: 6px;
      border-radius: 99px;
      background: rgba(255,255,255,.2);
      overflow: hidden;
    }
    #scrub-bar-fill { height: 100%; width: 0; background: #ff5a1f; border-radius: 99px; transition: width .1s; }
    #scrub-time { font-size: 30px; font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
    #scrub-hint { font-size: 16px; color: rgba(255,255,255,.55); }
  </style>
</head>
<body>
  <video id="player" autoplay></video>
  <div id="splash">
    <img class="logo" src="CozyFlameLogoColor.svg" alt="" aria-hidden="true" />
    <div class="name">CozyFlame Stream</div>
  </div>
  <div id="title-bar"></div>
  <div id="state-badge"></div>
  <div id="scrub" class="hidden">
    <img id="scrub-thumb" alt="" />
    <div id="scrub-bar"><div id="scrub-bar-fill"></div></div>
    <div id="scrub-time"></div>
    <div id="scrub-hint">◀ ▶ ajustar &nbsp;·&nbsp; OK confirmar &nbsp;·&nbsp; Voltar cancelar</div>
  </div>
</body>
</html>
